// Add the Huawei repository so Gradle knows where to download the HMS SDK
repositories {
    maven { url 'https://developer.huawei.com/repo/' }
}

dependencies {
    // SMS Retriever API from Google
    implementation 'com.google.android.gms:play-services-auth:21.6.0'
    implementation 'com.google.android.gms:play-services-auth-api-phone:18.1.0'

    // Add Huawei Mobile Services (Account Kit contains ReadSmsManager)
    implementation 'com.huawei.hms:hwid:6.12.0.300'
}
